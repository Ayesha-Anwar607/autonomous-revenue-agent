name: Semgrep Security Scan

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  semgrep:
    name: Static Security Analysis
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep Scan
        run: |
          semgrep scan \
            --config "p/owasp-top-ten" \
            --config "p/python" \
            --config "p/secrets" \
            --config "p/bandit" \
            --config "p/sql-injection" \
            --json -o semgrep-results.json

      - name: Upload Semgrep results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 30

      - name: Semgrep summary
        if: always()
        run: |
          echo "## 🔒 Semgrep Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "Scanned with rulesets: owasp-top-ten, python, secrets, bandit, sql-injection" >> $GITHUB_STEP_SUMMARY
          if [ -f semgrep-results.json ]; then
            FINDINGS=$(python3 -c "import json; d=json.load(open('semgrep-results.json')); print(len(d.get('results', [])))")
            echo "Total security findings: $FINDINGS" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Semgrep output file not found." >> $GITHUB_STEP_SUMMARY
          fi
